[package]
authors = ["Stef Korporaal <stefkorporaal@gmail.com>"]
default-run = "tfmt"
description = "Tag Formatting Tools. Renames audio files according to their tags."
edition = "2021"
license = "BSD-3-Clause"
name = "tfmttools"
rust-version = "1.70"
version = "0.14.0"

[features]
default = ["serde_json"]

[dependencies]
bincode = { version = "1.3", optional = true }
camino = { version = "1.1", features = ["serde", "serde1"] }
clap = { version = "4.4", features = ["derive", "wrap_help"] }
color-eyre = "0.6"
console = "0.15"
dirs = "5.0"
fs-err = "2.9"
ignore = "0.4"
indicatif = { version = "0.17", features = ["improved_unicode"] }
lofty = "0.15"
once_cell = "1"
minijinja = { version = "1.0", features = ["loader", "custom_syntax", "debug"] }
regex = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", optional = true }
textwrap = "0.16"
time = { version = "0.3", features = ["local-offset", "serde"] }
tracing = "0.1"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
assert_cmd = "2.0"
assert_fs = "1.0"
