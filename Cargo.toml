[package]
authors = ["Stef Korporaal <stefkorporaal@gmail.com>"]
default-run = "tfmt"
description = "Tag Formatting Tools. Renames audio files according to their tags."
edition = "2021"
license = "BSD-3-Clause"
name = "tfmttools"
rust-version = "1.70"
version = "0.11.0"

[workspace]
members = ["./file-history", "./test-harness"]

[dependencies]
file-history = { path = "./file-history" }

clap = { version = "3", features = ["derive", "wrap_help"] }
conv = "0.3"
dirs = "4.0"
dunce = "1"
indicatif = "0.16"
lofty = "0.14"
once_cell = "1"
camino = "1.1"
color-eyre = "0.6"
minijinja = { version = "1.0", features = ["loader"] }
regex = "1.10"

[dev-dependencies]
test-harness = { path = "./test-harness" }

assert_cmd = "2.0"
assert_fs = "1.0"
predicates = "2.1"
