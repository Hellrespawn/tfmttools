[workspace.package]
version = "0.20.0"
authors = ["Stef Korporaal <stef@skorporaal.com>"]
description = "Use `minijinja` to rename audio files according to their tags."
edition = "2021"
license = "BSD-3-Clause"
rust-version = "1.74.1"
repository = "https://github.com/Hellrespawn/tfmttools"
homepage = "https://github.com/Hellrespawn/tfmttools"


[workspace]
members = [
    "tfmttools-core",
    "tfmttools-cli",
    "tfmttools-fs",
    "tfmttools-history",
    "tfmttools-test",
]
default-members = ["tfmttools-cli"]
resolver = "2"

[workspace.dependencies]
assert_cmd = "2.0.14"
assert_fs = "1.1.1"
camino = "1.1.7"
chrono = "0.4.38"
clap = "4.5.4"
color-eyre = "0.6.3"
console = "0.15.8"
convert_case = "0.6.0"
ctrlc = "3.4.4"
dirs = "5.0.1"
fs-err = "2.11.0"
id3 = "1.13.1"
ignore = "0.4.22"
indicatif = "0.17.8"
lofty = "0.20.0"
minijinja = "2.0.1"
once_cell = "1.19.0"
regex = "1.10.4"
serde = "1.0.202"
serde_json = "1.0.117"
termtree = "0.4.1"
textwrap = "0.16.1"
thiserror = "1.0.61"
tracing = "0.1.40"
tracing-appender = "0.2.3"
tracing-subscriber = "0.3.18"

[profile.release]
strip = true # Automatically strip symbols from the binary.
lto = "thin"
