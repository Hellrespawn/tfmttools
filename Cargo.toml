[workspace.package]
version = "0.22.0"
authors = ["Stef Korporaal <stef@skorporaal.com>"]
description = "Use `minijinja` to rename audio files according to their tags."
edition = "2024"
license = "BSD-3-Clause"
rust-version = "1.85.0"
repository = "https://github.com/Hellrespawn/tfmttools"
homepage = "https://github.com/Hellrespawn/tfmttools"


[workspace]
members = [
    "tfmttools-core",
    "tfmttools-cli",
    "tfmttools-fs",
    "tfmttools-history-core",
    "tfmttools-history-serde",
    "tfmttools-test",
]
default-members = ["tfmttools-cli"]
resolver = "2"

[workspace.dependencies]
assert_cmd = "2.0.14"
assert_fs = "1.1.1"
camino = "1.1.7"
chrono = "0.4.38"
clap = "4.5.29"
color-eyre = "0.6.3"
console = "0.15.8"
convert_case = "0.7.1"
ctrlc = "3.4.4"
dirs = "6.0.0"
fs-err = "3.1.0"
id3 = "1.16.2"
ignore = "0.4.22"
include_dir = "0.7.4"
indicatif = "0.17.11"
libtest-mimic = "0.8.1"
lofty = "0.22.2"
minijinja = "2.7.0"
regex = "1.10.4"
rusqlite = "0.32.1"
rusqlite_migration = "1.3.1"
serde = "1.0.217"
serde_json = "1.0.138"
textwrap = "0.16.1"
thiserror = "2.0.11"
tracing = "0.1.40"
tracing-appender = "0.2.3"
tracing-subscriber = "0.3.18"

[profile.release]
strip = true # Automatically strip symbols from the binary.
lto = "thin"
