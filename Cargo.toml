[package]
authors = ["Stef Korporaal <stefkorporaal@gmail.com>"]
default-run = "tfmt"
description = "Tag Formatting Tools. Renames audio files according to their tags."
edition = "2021"
license = "BSD-3-Clause"
name = "tfmttools"
rust-version = "1.70"
version = "0.12.0"

[workspace]
members = ["./file-history", "./test-harness"]

[dependencies]
file-history = { path = "./file-history" }

clap = { version = "4.4", features = ["derive", "wrap_help"] }
dirs = "5.0"
indicatif = "0.16"
lofty = "0.15"
once_cell = "1"
color-eyre = "0.6"
minijinja = { version = "1.0", features = ["loader", "custom_syntax", "debug"] }
regex = "1.10"

[dev-dependencies]
test-harness = { path = "./test-harness" }

assert_cmd = "2.0"
assert_fs = "1.0"
