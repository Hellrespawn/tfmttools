name: Release Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-release:
    name: Linux Release Package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build release archive
        uses: ./.forgejo/actions/rust-run
        with:
          command: scripts/package-release.sh

      - name: Build Arch package
        uses: docker://docker.io/library/archlinux:latest
        with:
          entrypoint: /bin/sh
          args: scripts/package-arch-in-container.sh

      - name: Stage release artifacts
        run: |
          set -eu
          rm -rf release-artifacts
          mkdir -p release-artifacts
          cp dist/*.tar.gz release-artifacts/
          cp dist/*.pkg.tar.* release-artifacts/
          cp dist/SHA256SUMS-* release-artifacts/

      - name: Upload release archive
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: tfmt-release-linux-x86_64
          path: release-artifacts/
          if-no-files-found: error
