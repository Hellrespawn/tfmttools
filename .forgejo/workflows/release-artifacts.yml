name: Release Artifacts

on:
  push:
    tags:
      - "v*"

jobs:
  artifacts:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: sh scripts/validate-release-tag.sh "${GITHUB_REF_NAME}"
      - run: sh scripts/ci.sh
      - run: sh scripts/package-release.sh
      - uses: actions/upload-artifact@v4
        with:
          name: tfmt-${{ matrix.os }}
          path: |
            dist/tfmt-*
            dist/SHA256SUMS-*
